services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: craftconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d craftconnect"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/craftconnect
      CORS_ORIGIN: http://localhost:8080
      SESSION_COOKIE_NAME: cc_session
      SESSION_COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start"
    ports:
      - "4000:4000"

  app:
    build:
      context: ./app
      args:
        VITE_API_BASE_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data: